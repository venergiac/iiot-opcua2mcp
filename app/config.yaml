server:
  endpoint: opc.tcp://0.0.0.0:4840
  namespace: http://opcua.simulator
  update_interval: 2

machines:
  Machine-001:
    vibration:
      node_id: ns=2;s=Machine-001/Device/Vibration
      unit: mm/s
      threshold: 3.5
      initial_value: 2.2
      min: 0.5
      max: 5.0
      step: 0.25
      randomize: true
    temperature:
      node_id: ns=2;s=Machine-001/Device/Temperature
      unit: C
      threshold: 80.0
      initial_value: 68.0
      min: 50.0
      max: 92.0
      step: 1.5
      randomize: true

  Machine-002:
    vibration:
      node_id: ns=2;s=Machine-002/Device/Vibration
      unit: mm/s
      threshold: 3.5
      initial_value: 2.6
      min: 0.5
      max: 5.1
      step: 0.25
      randomize: true
    temperature:
      node_id: ns=2;s=Machine-002/Device/Temperature
      unit: C
      threshold: 80.0
      initial_value: 70.0
      min: 50.0
      max: 94.0
      step: 1.5
      randomize: true
